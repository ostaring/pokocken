services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pokocken
      POSTGRES_USER: pokocken
      POSTGRES_PASSWORD: pokocken
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokocken -d pokocken"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__RecipesDb: Host=db;Port=5432;Database=pokocken;Username=pokocken;Password=pokocken
      Admin__AllowApiKeyFallback: "true"
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
